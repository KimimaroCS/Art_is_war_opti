<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Annuler mon rendez-vous — ART IS WAR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&family=Barlow:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0C0D10;--sumi:#15171C;--panel:#1B1E25;--line:#2C313B;--bone:#E8E2D6;--grey:#8B919C;--seal:#C8322B;--seal-hi:#E2453D;--free:#3FA65C;--gold:#C9A227;--r:2px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--ink);color:var(--bone);font-family:'Barlow',system-ui,sans-serif;font-size:16px;line-height:1.6;min-height:100vh;display:flex;flex-direction:column}
  .wrap{max-width:560px;margin:0 auto;padding:0 20px;width:100%}
  h1{font-family:'Big Shoulders Display',Impact,sans-serif;font-weight:900;text-transform:uppercase;line-height:.94;font-size:clamp(34px,8vw,54px)}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--grey)}
  .mono{font-family:'JetBrains Mono',monospace}
  a{color:var(--seal-hi)}
  :focus-visible{outline:2px solid var(--seal-hi);outline-offset:3px}
  header{border-bottom:1px solid var(--line);padding:40px 0 30px}
  .back{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--grey);text-decoration:none}
  .back:hover{color:var(--seal-hi)}
  main{flex:1;padding:36px 0 60px}
  .card{background:var(--sumi);border:1px solid var(--line);border-radius:var(--r);padding:24px}
  .recap{background:var(--panel);border-left:3px solid var(--seal);padding:14px 16px;border-radius:var(--r);margin:18px 0}
  dl{display:grid;grid-template-columns:auto 1fr;gap:4px 14px;font-size:14px}
  dt{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--grey);padding-top:3px}
  dd{color:var(--bone)}
  .btn{border:none;cursor:pointer;border-radius:var(--r);font-family:'Big Shoulders Display',sans-serif;font-weight:700;font-size:19px;text-transform:uppercase;letter-spacing:.06em;padding:12px 24px;background:var(--seal);color:#fff;text-decoration:none;display:inline-block}
  .btn:hover{background:var(--seal-hi)}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--bone)}
  .btn.ghost:hover{border-color:var(--bone)}
  .btn[disabled]{opacity:.4;cursor:not-allowed}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:20px}
  .msg{font-size:15px;color:#BFB9AC}
  .err{color:var(--seal-hi)}
  .ok h2{font-family:'Big Shoulders Display',sans-serif;font-weight:900;text-transform:uppercase;font-size:30px;color:var(--free);margin-bottom:8px}
  .status{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--grey)}
  footer{border-top:1px solid var(--line);padding:22px 0 34px;color:var(--grey);font-size:13px}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <a class="back" href="index.html">← Retour au planning</a>
    <p class="eyebrow" style="margin-top:20px">Commande</p>
    <h1>Annuler mon<br>rendez-vous</h1>
  </div>
</header>

<main>
  <div class="wrap">
    <div class="card" id="panel">
      <p class="status" id="loading">Vérification de ton lien…</p>
    </div>
  </div>
</main>

<footer class="wrap">
  ART IS WAR — annulation gratuite tant que la session n'a pas commencé.
</footer>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2.45.4";

/* ⚠️ Mêmes valeurs que dans index.html */
const CONFIG = {
  supabaseUrl: "https://taqdcytecvabwyanyptb.supabase.co",
  supabaseAnonKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRhcWRjeXRlY3ZhYnd5YW55cHRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NTYwMjAsImV4cCI6MjA5OTQzMjAyMH0.MwAgQTIqxuTzTUpd-l_sTiLEmU9bjRPzwR-PPp8vCJU",
  discord: "https://discord.gg/ton-lien",
  brand: "ART IS WAR"
};

const DEMO = !CONFIG.supabaseUrl || !CONFIG.supabaseAnonKey;
const sb = DEMO ? null : createClient(CONFIG.supabaseUrl, CONFIG.supabaseAnonKey);
const $ = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[<>&"]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c]));
const fmtFull = iso => new Date(iso).toLocaleString("fr-FR",{weekday:"long",day:"numeric",month:"long",hour:"2-digit",minute:"2-digit"});

const params = new URLSearchParams(location.search);
const ref   = (params.get("ref") || "").toUpperCase();
const token = params.get("t") || "";

const panel = $("panel");
const fail = html => panel.innerHTML = `<p class="msg err">${html}</p>
  <div class="row"><a class="btn ghost" href="index.html">Retour au planning</a>
  <a class="btn ghost" href="${CONFIG.discord}" target="_blank" rel="noopener">Me contacter sur Discord</a></div>`;

/* --- démo (aucune base configurée) --- */
const demoStore = {
  key:"aiw-demo",
  async get(){ try{ const r = await window.storage.get(this.key,true); return r?.value ? JSON.parse(r.value) : null; }catch(e){ return null; } },
  async set(d){ try{ await window.storage.set(this.key, JSON.stringify(d), true); }catch(e){} }
};

async function findOrder(){
  if(DEMO){
    const d = await demoStore.get();
    if(!d) return null;
    const o = d.orders.find(x => x.ref === ref && x.cancel_token === token);
    if(!o) return null;
    const s = d.slots.find(x => String(x.id) === String(o.slot_id));
    return { ...o, start_at: s ? s.start_at : null, _data:d };
  }
  const { data, error } = await sb.rpc("check_cancel", { p_ref: ref, p_token: token });
  if(error || !data || !data.length) return null;
  return data[0];
}

async function doCancel(o){
  if(DEMO){
    const d = o._data;
    const order = d.orders.find(x => x.ref === ref);
    order.status = "cancelled";
    const slot = d.slots.find(x => String(x.id) === String(order.slot_id));
    if(slot) slot.status = "open";
    await demoStore.set(d);
    return true;
  }
  const { data, error } = await sb.rpc("cancel_order", { p_ref: ref, p_token: token });
  return !error && data === true;
}

(async () => {
  if(!ref || !token) return fail("Lien incomplet. Utilise le bouton « Annuler mon rendez-vous » présent dans ton mail de confirmation.");

  const o = await findOrder();
  if(!o) return fail("Ce lien n'est pas valide, ou la commande n'existe plus. Vérifie que tu utilises bien le lien reçu par mail.");

  if(o.status === "cancelled")
    return panel.innerHTML = `<div class="ok"><h2>Déjà annulée</h2>
      <p class="msg">La commande <b class="mono">${esc(o.ref)}</b> a déjà été annulée. Le créneau est de nouveau libre.</p>
      <div class="row"><a class="btn" href="index.html">Reprendre un créneau</a></div></div>`;

  if(o.status === "done")
    return fail(`La session de la commande <b class="mono">${esc(o.ref)}</b> a déjà eu lieu : elle ne peut plus être annulée. Une question ? Écris-moi sur <a href="${CONFIG.discord}">Discord</a>.`);

  if(o.start_at && new Date(o.start_at).getTime() < Date.now())
    return fail(`L'heure du rendez-vous est passée : l'annulation en ligne n'est plus possible. Écris-moi sur <a href="${CONFIG.discord}">Discord</a>.`);

  panel.innerHTML = `
    <p class="msg">Tu es sur le point d'annuler ce rendez-vous. Le créneau repartira aussitôt en vert pour quelqu'un d'autre.</p>
    <div class="recap"><dl>
      <dt>Commande</dt><dd class="mono">${esc(o.ref)}</dd>
      <dt>Rendez-vous</dt><dd>${o.start_at ? fmtFull(o.start_at) : "—"}</dd>
      <dt>Coût</dt><dd>0 € — rien n'a été payé, rien ne sera prélevé</dd>
    </dl></div>
    <p class="msg">L'annulation est gratuite et sans justification. Elle est définitive : pour revenir, il faudra reprendre un créneau libre.</p>
    <div class="row">
      <button class="btn" id="go" type="button">Confirmer l'annulation</button>
      <a class="btn ghost" href="index.html">Non, je garde mon créneau</a>
    </div>
    <p class="msg err" id="err" style="margin-top:12px"></p>`;

  $("go").onclick = async () => {
    $("go").disabled = true;
    $("go").textContent = "Annulation…";
    const ok = await doCancel(o);
    if(!ok){
      $("go").disabled = false; $("go").textContent = "Confirmer l'annulation";
      return $("err").textContent = "L'annulation n'a pas pu être enregistrée. Réessaie, ou préviens-moi sur Discord.";
    }
    panel.innerHTML = `<div class="ok"><h2>Rendez-vous annulé</h2>
      <p class="msg">La commande <b class="mono">${esc(o.ref)}</b> est annulée et le créneau est de nouveau disponible. Tu n'as rien à payer.</p>
      <p class="msg" style="margin-top:10px">Quand tu veux, reprends un créneau : je t'attends. — ${CONFIG.brand}</p>
      <div class="row"><a class="btn" href="index.html">Choisir un nouveau créneau</a>
      <a class="btn ghost" href="${CONFIG.discord}" target="_blank" rel="noopener">Discord</a></div></div>`;
  };
})();
</script>
</body>
</html>
