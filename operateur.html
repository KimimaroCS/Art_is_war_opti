<style>
  :root{
    --ink:#0C0D10; --sumi:#15171C; --panel:#1B1E25; --line:#2C313B;
    --bone:#E8E2D6; --grey:#8B919C; --seal:#C8322B; --seal-hi:#E2453D;
    --free:#3FA65C; --free-hi:#4FC470; --gold:#C9A227; --r:2px;
  }
  html.dark :root{
    --ink:#F5F5F5; --sumi:#EEEEEE; --panel:#E8E8E8; --line:#D0D0D0;
    --bone:#222222; --grey:#666666; --seal:#C8322B; --seal-hi:#E2453D;
    --free:#3FA65C; --free-hi:#4FC470; --gold:#C9A227; --r:2px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}

  .wrap{max-width:960px;margin:0 auto;padding:0 20px}
  h1,h2,h3{font-family:'Big Shoulders Display',Impact,sans-serif;font-weight:900;line-height:.92;text-transform:uppercase}
  .mono{font-family:'JetBrains Mono',monospace}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--grey)}
  a{color:var(--bone)}
  :focus-visible{outline:2px solid var(--seal-hi);outline-offset:3px}

  header.hero{position:relative;padding:60px 0 36px;border-bottom:1px solid var(--line);overflow:hidden}
  .seal{position:absolute;top:26px;right:20px;width:64px;height:64px;border:2px solid var(--seal);color:var(--seal);border-radius:var(--r);display:grid;place-items:center;font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:13px;line-height:1;text-align:center;transform:rotate(-6deg)}
  .hero h1{font-size:clamp(56px,15vw,130px);margin:12px 0 6px}
  .hero h1 em{font-style:normal;color:var(--seal)}
  .hero p.lead{max-width:46ch;color:var(--grey);font-size:18px;margin-bottom:22px}
  .hero p.lead b{color:var(--bone);font-weight:600}
  .eq{width:100%;height:74px;display:block;margin:22px 0 0}
  .eq path{fill:none;stroke:var(--seal);stroke-width:2}
  .eq path.ghost{stroke:var(--line);stroke-width:1}
  .price-tag{display:inline-flex;align-items:baseline;gap:8px;border:1px solid var(--line);padding:8px 14px;border-radius:var(--r);background:var(--sumi)}
  .price-tag .amt{font-family:'Big Shoulders Display',sans-serif;font-size:30px;font-weight:900;line-height:1}
  .price-tag .lbl{font-size:12px;color:var(--grey);letter-spacing:.12em;text-transform:uppercase}

  .btn{display:inline-block;border:none;cursor:pointer;border-radius:var(--r);font-family:'Big Shoulders Display',sans-serif;font-weight:700;font-size:19px;text-transform:uppercase;letter-spacing:.06em;padding:12px 24px;background:var(--seal);color:#fff;text-decoration:none;transition:background .15s}
  .btn:hover{background:var(--seal-hi)}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--bone)}
  .btn.ghost:hover{border-color:var(--bone)}
  .btn.sm{font-size:14px;padding:7px 12px}
  .btn[disabled]{opacity:.4;cursor:not-allowed}

  section{padding:52px 0;border-bottom:1px solid var(--line)}
  section h2{font-size:clamp(30px,6vw,46px);margin:8px 0 20px}

  .banner{border-left:3px solid var(--gold);background:var(--sumi);padding:12px 14px;border-radius:var(--r);margin-bottom:22px;font-size:15px}

  .money p{font-size:15px;color:var(--grey);margin:0}
  .money b{color:var(--bone)}

  .steps{display:grid;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:var(--r)}
  @media(min-width:720px){.steps{grid-template-columns:repeat(3,1fr)}}

  .step .num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--seal);letter-spacing:.2em}
  .step h3{font-size:23px;margin:6px 0 8px}
  .step p{color:var(--grey);font-size:15px}

  .legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--grey)}

  .dot.g{background:var(--free)} .dot.r{background:var(--seal)}

  .day{margin-bottom:24px}
  .day-head{display:flex;align-items:baseline;gap:12px;padding-bottom:8px;border-bottom:1px solid var(--line);margin-bottom:12px}
  .day-head h3{font-size:21px}
  .day-head span{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--grey)}
  .slots{display:flex;flex-wrap:wrap;gap:8px}
  .slot{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;border-radius:var(--r);padding:11px 15px;text-align:left;cursor:pointer;transition:background .15s,border-color .15s}

  .slot.free:hover{background:rgba(63,166,92,.2)}
  .slot.free[aria-pressed="true"]{background:var(--free);color:#08120B}
  .slot.taken{background:rgba(200,50,43,.08);border:1px solid var(--seal);color:var(--seal);cursor:not-allowed}
  .slot .tag{display:block;font-size:9px;letter-spacing:.14em;margin-top:2px;opacity:.85}
  .empty{border:1px dashed var(--line);border-radius:var(--r);padding:26px;text-align:center;color:var(--grey)}

  .card{background:var(--sumi);border:1px solid var(--line);border-radius:var(--r);padding:22px;margin-top:22px}
  .selected{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;background:var(--panel);border-left:3px solid var(--free);padding:12px 14px;margin-bottom:20px}
  .selected .when{font-family:'JetBrains Mono',monospace;font-weight:600}
  .field{margin-bottom:16px}
  label{display:block;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--grey);margin-bottom:6px;font-weight:600}
  label .req{color:var(--seal)}
  input[type=text],input[type=email],input[type=password],input[type=date],select,textarea{
    width:100%;background:var(--ink);border:1px solid var(--line);border-radius:var(--r);
    color:var(--bone);font-family:'Barlow',sans-serif;font-size:16px;padding:11px 12px}
  input[type=date]{font-family:'JetBrains Mono',monospace}
  input:focus,select:focus,textarea:focus{border-color:var(--seal)}
  textarea{resize:vertical;min-height:76px}
  .hint{font-size:13px;color:var(--grey);margin-top:6px}
  .check{display:flex;gap:10px;align-items:flex-start;font-size:15px;color:var(--bone)}
  .check input{margin-top:4px;accent-color:var(--free);width:18px;height:18px;flex:0 0 auto}
  .anydesk{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap;background:var(--panel);border:1px solid var(--line);padding:13px;border-radius:var(--r);margin-bottom:10px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .error{color:var(--seal-hi);font-size:14px;margin-top:8px;min-height:1em}
  .status{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--grey)}

  .done{text-align:center;padding:34px 20px}
  .done h3{font-size:32px;color:var(--free);margin-bottom:6px}
  .ref{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:600;border:1px solid var(--gold);color:var(--gold);padding:8px 14px;border-radius:var(--r);margin:12px 0}

  .op-toggle{background:none;border:none;color:var(--grey);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;padding:0}
  .op-toggle:hover{color:var(--seal)}
  .grid3{display:grid;gap:12px}
  @media(min-width:640px){.grid3{grid-template-columns:1fr 1fr auto;align-items:end}}
  .pill{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;padding:3px 8px;border-radius:var(--r);border:1px solid;text-transform:uppercase}
  .p-pending{color:var(--gold);border-color:var(--gold)}
  .p-confirmed{color:var(--free);border-color:var(--free)}
  .p-done{color:var(--grey);border-color:var(--line)}
  .p-cancelled{color:var(--seal);border-color:var(--seal)}
  .ord{border:1px solid var(--line);border-radius:var(--r);padding:13px;margin-bottom:8px;background:var(--sumi)}
  .ord .top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
  .ord dl{display:grid;grid-template-columns:auto 1fr;gap:2px 10px;font-size:13px;margin-bottom:10px}
  .ord dt{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--grey);padding-top:2px}
  .ord dd{color:var(--bone);word-break:break-word}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .tab{background:var(--panel);border:1px solid var(--line);color:var(--grey);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:7px 11px;border-radius:var(--r);cursor:pointer}
  .tab[aria-selected="true"]{border-color:var(--seal);color:var(--bone)}
  .switch{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;background:var(--panel);border:1px solid var(--line);padding:13px;border-radius:var(--r);margin-bottom:16px}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--panel);border:1px solid var(--free);color:var(--bone);padding:11px 18px;border-radius:var(--r);font-size:14px;z-index:50;max-width:90vw;text-align:center}
  .toast[hidden]{display:none}
  footer{padding:32px 0;color:var(--grey);font-size:13px;display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}html{scroll-behavior:auto}}
</style>

<body>

const $ = id => document.getElementById(id);
const $$ = sel => document.querySelectorAll(sel);
const esc = s => String(s ?? "").replace(/[<>&"]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c]));
const DEMO = !CONFIG.supabaseUrl || !CONFIG.supabaseAnonKey;
const sb = DEMO ? null : createClient(CONFIG.supabaseUrl, CONFIG.supabaseAnonKey);

// Toggle thème sombre
const initTheme = () => {
  const theme = localStorage.getItem("theme") || "light";
  if(theme === "dark") document.documentElement.classList.add("dark");
  updateThemeButton();
};

const updateThemeButton = () => {
  const isDark = document.documentElement.classList.contains("dark");
  $("theme-toggle").textContent = isDark ? "☀️" : "🌙";
};

$("theme-toggle").onclick = () => {
  const isDark = document.documentElement.classList.toggle("dark");
  localStorage.setItem("theme", isDark ? "dark" : "light");
  updateThemeButton();
};

let slots = [], orders = [], settings = { available:true, away_message:"" };
let selectedId = null, isAdmin = false, filter = "pending", reviews = [];

// Toggle thème sombre
// Avis clients
async function fetchReviews(){
  if(DEMO){ return; }
  const { data } = await sb.from("reviews").select("*").eq("approved", true).order("created_at", {ascending: false});
  reviews = data || [];
  renderReviews();
}

// Afficher les avis
function renderReviews(){
  const box = $("reviews-list");
  if(!reviews.length) return box.innerHTML = `<p class="hint" style="grid-column:1/-1">Aucun avis pour le moment. Sois le premier !</p>`;
  box.innerHTML = reviews.map(r => `<div class="card" style="padding:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div>
        <strong>${esc(r.pseudo)}</strong>
        <span style="font-size:12px;color:var(--grey);margin-left:6px">#${esc(r.order_ref)}</span>
      </div>
      <span>${"⭐".repeat(r.rating)}</span>
    </div>
    <p style="margin:0;font-size:14px;color:var(--grey)">${esc(r.comment)}</p>
  </div>`).join("");
}

// Soumettre un avis
$("review-submit").onclick = async () => {
  const ref = $("review-ref").value.trim().toUpperCase();
  const pseudo = $("review-pseudo").value.trim();
  const rating = parseInt($("review-rating").value);
  const comment = $("review-comment").value.trim();
  const err = $("review-error");
  
  // Validations
  if(!ref || ref.length < 5) return err.textContent = "Numéro de commande invalide (format : AIW-0001)";
  if(!pseudo || pseudo.length < 2) return err.textContent = "Pseudo trop court";
  if(!comment || comment.length < 5) return err.textContent = "Commentaire trop court";
  
  // Vérifier que la commande existe et est terminée
  if(DEMO){ toast("Mode démo : les avis ne sont pas sauvegardés"); return; }
  
  const order = orders.find(o => o.ref === ref);
  if(!order) return err.textContent = `Commande ${ref} introuvable`;
  if(order.status !== "done") return err.textContent = `La session ${ref} n'est pas terminée ou n'existe pas`;
  
  err.textContent = "";
  
  const { error } = await sb.from("reviews").insert({ order_ref: ref, pseudo, rating, comment });
  if(error) return err.textContent = "Erreur : "+error.message;
  
  toast("Merci ! Ton avis sera publié après validation");
  $("review-ref").value = "";
  $("review-pseudo").value = "";
  $("review-comment").value = "";
  $("review-rating").value = "5";
};

$("anydesk-link").href = CONFIG.anydeskUrl;

(function curve(){
  const p=[];
  for(let x=0;x<=900;x+=10){
    const sub=24*Math.exp(-Math.pow((x-230)/90,2)), mid=28*Math.exp(-Math.pow((x-520)/120,2)), hi=9*Math.exp(-Math.pow((x-820)/110,2));
    p.push(`${x},${(37+sub-mid-hi).toFixed(1)}`);
  }
  $("curve").setAttribute("d","M"+p.join(" L"));
})();

const toast = m => { const t=$("toast"); t.textContent=m; t.hidden=false; setTimeout(()=>t.hidden=true,4000); };
const fmtDay  = iso => new Date(iso).toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
const fmtTime = iso => new Date(iso).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
const fmtFull = iso => `${fmtDay(iso)} à ${fmtTime(iso)}`;

const STATUS = {
  pending:  {label:"Réservation reçue", cls:"p-pending"},
  confirmed:{label:"Validée",           cls:"p-confirmed"},
  done:     {label:"Terminée & payée",  cls:"p-done"},
  cancelled:{label:"Annulée",           cls:"p-cancelled"}
};
const pill = s => `<span class="pill ${STATUS[s].cls}">${STATUS[s].label}</span>`;

/* ==========================================================
   DONNÉES — Supabase, ou mode démo local (aperçu sans base)
   ========================================================== */
const demo = {
  key: "aiw-demo",
  async get(){ try{ const r = await window.storage.get(this.key,true); return r?.value ? JSON.parse(r.value) : null; }catch(e){ return null; } },
  async set(d){ try{ await window.storage.set(this.key, JSON.stringify(d), true); }catch(e){} }
};

async function fetchAll(){
  if(DEMO){
    const d = await demo.get() || { slots:[], orders:[], settings:{available:true,away_message:""}, counter:1 };
    slots = d.slots; orders = d.orders; settings = d.settings;
    return;
  }
  const [s,o,st] = await Promise.all([
    sb.from("slots").select("*").order("start_at"),
    isAdmin ? sb.from("orders").select("*").order("created_at",{ascending:false}) : Promise.resolve({data:[]}),
    sb.from("settings").select("*").eq("id",1).single()
  ]);
  slots = s.data || []; orders = o.data || [];
  if(st.data) settings = st.data;
}
async function demoSave(){
  const d = await demo.get() || { counter:1 };
  await demo.set({ slots, orders, settings, counter: d.counter || 1 });

const mailReady = () => CONFIG.emailjs.serviceId && CONFIG.emailjs.templateId && CONFIG.emailjs.publicKey;
async function deliver(to, mail, label){
  if(!mailReady()){
    const txt = mail.html.replace(/<br\s*\/?>/gi,"\n").replace(/<\/p>/gi,"\n\n").replace(/<[^>]+>/g,"").replace(/\n{3,}/g,"\n\n").trim();
    toast("Envoi auto non configuré — ouverture de ta messagerie");
    window.open(`mailto:${to}?subject=${encodeURIComponent(mail.subject)}&body=${encodeURIComponent(txt)}`,"_blank");
    return;
  }
  try{
    const r = await fetch("https://api.emailjs.com/api/v1.0/email/send",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        service_id: CONFIG.emailjs.serviceId,
        template_id: CONFIG.emailjs.templateId,
        user_id: CONFIG.emailjs.publicKey,
        template_params:{ to_email:to, subject:mail.subject, message_html:mail.html }
      })
    });
    toast(r.ok ? `Mail « ${label} » envoyé` : "Le mail n'est pas parti");
  }catch(e){ toast("Le mail n'est pas parti"); }
}

// Mettre à jour le dashboard de stats
function updateStats(){
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  
  // Sessions "done" ce mois-ci
  const sessionsDone = orders.filter(o => o.status === "done" && new Date(o.created_at) >= monthStart).length;
  
  // Estimé revenue
  const revenue = sessionsDone * CONFIG.price;
  
  // Taux de remplissage
  const totalSlots = slots.length || 1;
  const bookedSlots = slots.filter(s => s.status === "booked").length;
  const fillRate = totalSlots > 0 ? Math.round((bookedSlots / totalSlots) * 100) : 0;
  
  // Mettre à jour le HTML
  const statBox = $("op-stats");
  if(statBox){
    statBox.innerHTML = `
      <div style="text-align:center">
        <div style="font-size:28px;font-weight:900;color:var(--free)">${sessionsDone}</div>
        <div style="font-size:12px;color:var(--grey)">Sessions ce mois</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:28px;font-weight:900;color:var(--gold)">${revenue}€</div>
        <div style="font-size:12px;color:var(--grey)">Estimé ce mois</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:28px;font-weight:900;color:var(--seal)">${fillRate}%</div>
        <div style="font-size:12px;color:var(--grey)">Taux de remplissage</div>
      </div>
    `;
  }
}

function render(){
  const box = $("slots-container"), now = Date.now();
  const upcoming = slots
    .filter(s => new Date(s.start_at).getTime() > now - 3600e3)
    .sort((a,b) => new Date(a.start_at) - new Date(b.start_at));
  const visible = settings.available ? upcoming.filter(s => s.status !== "closed") : [];

  $("away-banner").hidden = !!settings.available;
  $("away-text").textContent = settings.away_message || "Réservations fermées pour le moment. Je rouvre des créneaux très vite.";

  const free = visible.filter(s => s.status === "open").length;
  $("foot-count").textContent = !settings.available ? "réservations fermées"
    : free ? `${free} créneau${free>1?"x":""} libre${free>1?"s":""}` : "complet";

  if(!visible.length){
    box.innerHTML = `<div class="empty">${settings.available ? "Aucun créneau ouvert pour le moment. Repasse bientôt." : "Planning fermé."}</div>`;
  } else {
    const days = {};
    visible.forEach(s => { const k = s.start_at.slice(0,10); (days[k] = days[k]||[]).push(s); });
    box.innerHTML = Object.values(days).map(l => `
      <div class="day">
        <div class="day-head"><h3>${fmtDay(l[0].start_at)}</h3>
          <span>${l.filter(s=>s.status==="open").length} libre(s) / ${l.length}</span></div>
        <div class="slots">${l.map(s => s.status==="open"
          ? `<button class="slot free" data-id="${s.id}" aria-pressed="${selectedId===s.id}">${fmtTime(s.start_at)}<span class="tag">LIBRE · ${CONFIG.sessionMinutes} MIN</span></button>`
          : `<button class="slot taken" disabled>${fmtTime(s.start_at)}<span class="tag">RÉSERVÉ</span></button>`
        ).join("")}</div>
      </div>`).join("");
    box.querySelectorAll(".slot.free").forEach(b => b.addEventListener("click", () => selectSlot(b.dataset.id)));
  }
  if(isAdmin){ renderHourCheckboxes(); renderOpSlots(); renderHistory(); renderOrders(); updateStats(); }
}

  render();
  $("booking").scrollIntoView({behavior:"smooth",block:"start"});
}

$("submit-btn").onclick = async () => {
  const err = $("form-error");
  const pseudo=$("f-pseudo").value.trim(), casque=$("f-casque").value.trim(), mail=$("f-mail").value.trim();
  if(!selectedId) return err.textContent = "Choisis un créneau vert.";
  if(!pseudo)     return err.textContent = "Ton pseudo Discord est obligatoire.";
  if(!casque)     return err.textContent = "Indique ton casque.";
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(mail)) return err.textContent = "Adresse mail invalide.";
  if(!$("f-ok-anydesk").checked) return err.textContent = "Confirme l'installation d'AnyDesk.";
  if(!$("f-ok-price").checked)   return err.textContent = "Confirme que tu as compris le tarif.";
  err.textContent = ""; $("submit-btn").disabled = true;

  const payload = {
    p_slot: selectedId, p_pseudo: pseudo, p_casque: casque, p_email: mail,
    p_materiel: $("f-materiel").value.trim(), p_jeu: $("f-jeu").value,
    p_anydesk: $("f-anydesk").value.trim(), p_notes: $("f-notes").value.trim()
  };

  let order = null, slot = slots.find(s => String(s.id) === String(selectedId));

  if(DEMO){
    const d = await demo.get() || { counter:1 };
    const counter = d.counter || 1;
    if(!slot || slot.status !== "open"){ $("submit-btn").disabled=false; return err.textContent = "Ce créneau vient d'être pris."; }
    order = { ref:`AIW-${String(counter).padStart(4,"0")}`, slot_id:slot.id, status:"pending",
      pseudo, casque, email:mail, materiel:payload.p_materiel, jeu:payload.p_jeu,
      anydesk:payload.p_anydesk, notes:payload.p_notes, created_at:new Date().toISOString(),
      cancel_token: crypto.randomUUID() };
    orders.unshift(order); slot.status = "booked"; slot.order_ref = order.ref;
    await demo.set({ slots, orders, settings, counter: counter+1 });
  } else {
    // fonction SQL atomique : réserve le créneau ET crée la commande
    const { data, error } = await sb.rpc("book_slot", payload);
    $("submit-btn").disabled = false;
    if(error || !data){ await refresh(); return err.textContent = "Ce créneau vient d'être pris. Choisis-en un autre."; }
    order = data;
    await refresh();
    slot = slots.find(s => String(s.id) === String(order.slot_id)) || slot;
  }

  $("submit-btn").disabled = false;
  await deliver(mail, mailReceived(order, slot), "réservation reçue");

  // Toast de confirmation avec numéro AIW
  toast(`✅ Réservation confirmée ! Numéro : <b style="color:#C9A227">${order.ref}</b>`, 5000);

  $("done-ref").textContent = order.ref;
  $("done-when").textContent = fmtFull(slot.start_at);
  $("booking").hidden = true; $("done").hidden = false;
  ["f-pseudo","f-casque","f-materiel","f-mail","f-anydesk","f-notes"].forEach(i => $(i).value="");
  $("f-ok-anydesk").checked = $("f-ok-price").checked = false;
  selectedId = null; render();
  $("done").scrollIntoView({behavior:"smooth",block:"center"});
};

$("op-add").onclick = async () => {
  const d = $("op-date").value, e = $("op-add-error");
  if(!d) return e.textContent = "Indique une date.";
  const times = [...$$(".hour-check:checked")].map(cb => cb.value);
  if(!times.length) return e.textContent = "Coche au moins une heure.";
  e.textContent = "";
  const rows = times.map(t => {
    const [h,m] = t.split(":");
    return { start_at: `${d}T${h.padStart(2,"0")}:${m}:00`, status:"open" };
  }).filter(r => !slots.some(s => s.start_at.slice(0,16) === r.start_at.slice(0,16)));

  if(!rows.length){ toast("Ces créneaux existent déjà"); return; }
  if(DEMO){ rows.forEach(r => slots.push({ id:"s"+Date.now()+Math.random().toString(36).slice(2,5), ...r })); await demoSave(); }
  else { const { error } = await sb.from("slots").insert(rows); if(error) return e.textContent = "Erreur : "+error.message; await refresh(); }
  render(); toast(`${rows.length} créneau(x) ouvert(s)`);
  [...$$(".hour-check")].forEach(cb => cb.checked = false);
};

$("op-week").onclick = async () => {
  const today = new Date(), e = $("op-add-error");
  const times = [...$$(".hour-check:checked")].map(cb => cb.value);
  if(!times.length) return e.textContent = "Coche au moins une heure.";
  e.textContent = "";
  
  const rows = [];
  for(let i=0; i<7; i++){
    const d = new Date(today);
    d.setDate(d.getDate()+i);
    const dateStr = d.toISOString().slice(0,10);
    times.forEach(t => {
      const [h,m] = t.split(":");
      const start = `${dateStr}T${h.padStart(2,"0")}:${m}:00`;
      if(!slots.some(s => s.start_at.slice(0,16) === start.slice(0,16))) {
        rows.push({ start_at: start, status:"open" });
      }
    });
  }
  
  if(!rows.length){ toast("Tous ces créneaux existent déjà"); return; }
  if(DEMO){ rows.forEach(r => slots.push({ id:"s"+Date.now()+Math.random().toString(36).slice(2,5), ...r })); await demoSave(); }
  else { const { error } = await sb.from("slots").insert(rows); if(error) return e.textContent = "Erreur : "+error.message; await refresh(); }
  render(); toast(`${rows.length} créneau(x) ouvert(s) pour la semaine`);
  [...$$(".hour-check")].forEach(cb => cb.checked = false);
};

function renderOpSlots(){
  const box = $("op-slots");
  const list = [...slots].sort((a,b)=>new Date(a.start_at)-new Date(b.start_at));
  if(!list.length) return box.innerHTML = `<p class="hint">Aucun créneau.</p>`;
  const days = {};
  list.forEach(s => { const k = s.start_at.slice(0,10); (days[k]=days[k]||[]).push(s); });
  box.innerHTML = Object.values(days).map(l => `
    <div class="day"><div class="day-head"><h3>${fmtDay(l[0].start_at)}</h3></div>
    ${l.map(s => `<div class="row" style="justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line)">
      <span class="mono">${fmtTime(s.start_at)}
        <span style="font-size:11px;margin-left:8px;color:${s.status==="open"?"var(--free)":s.status==="booked"?"var(--seal)":"var(--grey)"}">
          ${s.status==="open"?"LIBRE":s.status==="booked"?"RÉSERVÉ":"FERMÉ"}</span></span>
      <span class="row" style="gap:6px">
        ${s.status!=="booked" ? `<button class="btn ghost sm" data-toggle="${s.id}">${s.status==="open"?"Fermer":"Rouvrir"}</button>` : ""}
        <button class="btn ghost sm" data-edit="${s.id}">Éditer heure</button>
        <button class="op-toggle" data-del="${s.id}">supprimer</button>
      </span></div>`).join("")}</div>`).join("");

  box.querySelectorAll("[data-toggle]").forEach(b => b.onclick = async () => {
    const s = slots.find(x => String(x.id) === b.dataset.toggle);
    s.status = s.status === "open" ? "closed" : "open";
    if(DEMO) await demoSave(); else await sb.from("slots").update({status:s.status}).eq("id",s.id);
    await refresh(); render();
  });
  box.querySelectorAll("[data-edit]").forEach(b => b.onclick = async () => {
    const s = slots.find(x => String(x.id) === b.dataset.edit);
    const currentTime = s.start_at.slice(11,16);
    const newTime = prompt(`Nouvelle heure pour ${fmtDay(s.start_at)} (format HH:MM) :\nActuelle : ${currentTime}`, currentTime);
    if(!newTime || !/^\d{2}:\d{2}$/.test(newTime.trim())) return;
    const [h,m] = newTime.trim().split(":");
    const newStart = `${s.start_at.slice(0,10)}T${h}:${m}:00`;
    if(slots.some(x => String(x.id) !== String(s.id) && x.start_at.slice(0,16) === newStart.slice(0,16))) return toast("Cette heure existe déjà ce jour.");
    s.start_at = newStart;
    if(DEMO) await demoSave(); else await sb.from("slots").update({start_at:newStart}).eq("id",s.id);
    await refresh(); render();
  });
  box.querySelectorAll("[data-del]").forEach(b => b.onclick = async () => {
    if(!confirm("Supprimer ce créneau ?")) return;
    if(DEMO){ slots = slots.filter(x => String(x.id) !== b.dataset.del); await demoSave(); }
    else await sb.from("slots").delete().eq("id", b.dataset.del);
    await refresh(); render();
  });
}

$("op-tabs").onclick = e => {
  const t = e.target.closest(".tab"); if(!t) return;
  filter = t.dataset.f;
  [...$("op-tabs").children].forEach(x => x.setAttribute("aria-selected", x===t));
  renderOrders();
};

// Afficher l'historique des sessions
function renderHistory(){
  const box = $("op-history");
  if(!box) return;
  
  const done = [...orders]
    .filter(o => o.status === "done")
    .sort((a,b) => new Date(b.created_at) - new Date(a.created_at))
    .slice(0, 20);
  
  if(!done.length) return box.innerHTML = `<p class="hint">Aucune session terminée.</p>`;
  
  box.innerHTML = done.map(o => {
    const s = slots.find(s => String(s.id) === String(o.slot_id));
    return `<div style="padding:10px 0;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center">
      <div style="flex:1">
        <strong>${esc(o.pseudo)}</strong> — <span class="mono">${o.ref}</span><br>
        <span style="font-size:12px;color:var(--grey)">${s ? fmtFull(s.start_at) : "—"}</span>
      </div>
      <span style="color:var(--free);font-weight:900">${CONFIG.price}€</span>
    </div>`;
  }).join("");
}

function renderOrders(){
  const box = $("op-orders");
  const list = orders.filter(o => filter==="all" || o.status===filter);
  if(!list.length) return box.innerHTML = `<p class="hint">Aucune commande.</p>`;
  box.innerHTML = list.map(o => {
    const s = slots.find(x => String(x.id) === String(o.slot_id));
    return `<div class="ord">
      <div class="top"><strong class="mono">${esc(o.ref)}</strong>${pill(o.status)}</div>
      <dl>
        <dt>RDV</dt><dd class="mono">${s ? fmtFull(s.start_at) : "créneau supprimé"}</dd>
        <dt>Discord</dt><dd>${esc(o.pseudo)}</dd>
        <dt>Mail</dt><dd>${esc(o.email)}</dd>
        <dt>Casque</dt><dd>${esc(o.casque)}${o.materiel ? " — "+esc(o.materiel) : ""}</dd>
        <dt>Jeu</dt><dd>${esc(o.jeu)}</dd>
        <dt>AnyDesk</dt><dd>${esc(o.anydesk || "à donner en session")}</dd>
        ${o.notes ? `<dt>Notes</dt><dd>${esc(o.notes)}</dd>` : ""}
      </dl>
      <div class="row">
        ${o.status==="pending"   ? `<button class="btn sm" data-act="confirm" data-ref="${o.ref}">Valider + mail</button>` : ""}
        ${o.status==="confirmed" ? `<button class="btn ghost sm" data-act="done" data-ref="${o.ref}">Session faite & payée</button>` : ""}
        ${(o.status!=="cancelled" && o.status!=="done") ? `<button class="btn ghost sm" data-act="cancel" data-ref="${o.ref}">Annuler</button>` : ""}
        <button class="btn ghost sm" data-act="resend" data-ref="${o.ref}">Renvoyer le mail</button>
      </div></div>`;
  }).join("");
  box.querySelectorAll("[data-act]").forEach(b => b.onclick = () => action(b.dataset.act, b.dataset.ref));
}

async function setOrderStatus(o, status){
  o.status = status;
  if(DEMO) await demoSave();
  else await sb.from("orders").update({ status }).eq("ref", o.ref);
}

async function action(act, ref){
  const o = orders.find(x => x.ref === ref); if(!o) return;
  const s = slots.find(x => String(x.id) === String(o.slot_id)) || { start_at:o.created_at };

  if(act === "confirm"){ await setOrderStatus(o,"confirmed"); render(); await deliver(o.email, mailConfirmed(o,s), "commande validée"); }
  else if(act === "done"){ await setOrderStatus(o,"done"); render(); await deliver(o.email, mailDone(o,s), "session terminée"); }
  else if(act === "cancel"){
    if(!confirm(`Annuler ${ref} et remettre le créneau en vert ?`)) return;
    const reason = prompt("Raison d'annulation (optionnel) :", "");
    o.cancellation_reason = reason || "";
    await setOrderStatus(o,"cancelled");
    const slot = slots.find(x => String(x.id) === String(o.slot_id));
    if(slot){ slot.status = "open"; if(DEMO) await demoSave(); else await sb.from("slots").update({status:"open"}).eq("id",slot.id); }
    await refresh(); render();
    await deliver(o.email, mailCancelled(o,s), "commande annulée");
  }
  else if(act === "resend"){
    const m = o.status==="confirmed" ? mailConfirmed(o,s) : o.status==="done" ? mailDone(o,s)
            : o.status==="cancelled" ? mailCancelled(o,s) : mailReceived(o,s);
    await deliver(o.email, m, "renvoi");
  }
}

/* ---------- démarrage ---------- */
async function refresh(){ await fetchAll(); }
(async () => {
  initTheme();
  if(!DEMO){
    const { data } = await sb.auth.getSession();
    if(data.session){ isAdmin = true; }
  }
  await refresh();
  await fetchReviews();
  render();
  if(isAdmin){ $("op-panel").hidden = false; $("op-toggle").textContent = "× Fermer"; openConsole(); }
  if(DEMO) toast("Mode démo : configure Supabase pour la mise en ligne");
})();
