<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KimimaroFPS — Opérateur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;700;900&family=Barlow:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0C0D10;--sumi:#15171C;--panel:#1B1E25;--line:#2C313B;--bone:#E8E2D6;--grey:#8B919C;--seal:#C8322B;--free:#3FA65C;--gold:#C9A227}
  html.dark :root{--ink:#F5F5F5;--sumi:#EEEEEE;--panel:#E8E8E8;--line:#D0D0D0;--bone:#222222;--grey:#666666}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--ink);color:var(--bone);font-family:'Barlow',sans-serif;font-size:16px;line-height:1.55}
  .wrap{max-width:960px;margin:0 auto;padding:0 20px}
  h2{font-family:'Big Shoulders Display',sans-serif;font-size:32px;margin:0 0 24px;text-transform:uppercase}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:2px;padding:16px;margin:0 0 16px}
  .field{margin:0 0 16px}
  label{display:block;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin:0 0 6px;color:var(--grey)}
  input,select{font-family:inherit;font-size:inherit;border:1px solid var(--line);border-radius:2px;background:var(--sumi);color:var(--bone);padding:8px;width:100%}
  input:focus{outline:none;border-color:var(--free)}
  .btn{background:var(--seal);color:var(--bone);border:none;padding:10px 16px;font-weight:600;text-transform:uppercase;font-size:12px;border-radius:2px;cursor:pointer}
  .btn:hover{background:#E2453D}
  .btn.ghost{background:none;border:1px solid var(--line);color:var(--bone)}
  .btn.ghost:hover{border-color:var(--seal)}
  .error{color:var(--seal);font-size:12px;margin:8px 0 0}
  .tabs{display:flex;gap:4px;margin:0 0 16px;flex-wrap:wrap}
  .tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--grey);cursor:pointer;padding:8px 0;font-size:13px;font-weight:600;text-transform:uppercase}
  .tab[aria-selected="true"]{border-color:var(--free);color:var(--bone)}
  .eyebrow{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--grey)}
  .mono{font-family:'JetBrains Mono',monospace;font-size:12px}
</style>
</head>
<body>
<button id="theme-toggle" style="position:fixed;top:12px;right:12px;background:none;border:none;font-size:20px;cursor:pointer;padding:8px;z-index:999">🌙</button>

<section class="wrap" style="margin:40px 0">
  <h2>Panneau opérateur</h2>
  
  <div id="op-panel">
    <div id="op-login" class="card">
      <div class="field"><label for="op-mail">Email</label><input type="email" id="op-mail"></div>
      <div class="field"><label for="op-pass">Mot de passe</label><input type="password" id="op-pass"><p class="error" id="op-error"></p></div>
      <button class="btn" id="op-login-btn" style="margin-top:12px">Se connecter</button>
    </div>

    <div id="op-console" hidden>
      <div class="card">
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;text-align:center">
          <div><div style="font-size:28px;font-weight:900;color:var(--free)">—</div><div style="font-size:12px;color:var(--grey)">Sessions</div></div>
          <div><div style="font-size:28px;font-weight:900;color:var(--gold)">—</div><div style="font-size:12px;color:var(--grey)">Estimé</div></div>
          <div><div style="font-size:28px;font-weight:900;color:var(--seal)">—</div><div style="font-size:12px;color:var(--grey)">Remplissage</div></div>
        </div>
      </div>

      <div class="card">
        <p class="eyebrow" style="margin-bottom:12px">Ouvrir créneaux</p>
        <div class="field"><label for="op-date">Date</label><input type="date" id="op-date"></div>
        <div style="margin-bottom:12px"><label style="display:block;font-size:14px;font-weight:500;margin-bottom:8px">Heures</label><div id="op-hours" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:6px"></div></div>
        <div style="display:flex;gap:8px;margin-bottom:12px"><button class="btn" id="op-add">Ouvrir</button><button class="btn ghost" id="op-week">Semaine</button></div>
        <p class="error" id="op-add-error"></p>
      </div>

      <div class="card"><p class="eyebrow" style="margin-bottom:12px">Planning</p><div id="op-slots"></div></div>
      <div class="card"><p class="eyebrow" style="margin-bottom:12px">Historique</p><div id="op-history" style="max-height:300px;overflow-y:auto"></div></div>
      <div class="card"><p class="eyebrow" style="margin-bottom:12px">Commandes</p><div class="tabs" id="op-tabs"><button class="tab" data-f="pending" aria-selected="true">À valider</button><button class="tab" data-f="confirmed">Validées</button><button class="tab" data-f="done">Terminées</button><button class="tab" data-f="cancelled">Annulées</button></div><div id="op-orders"></div></div>
      <button class="btn ghost" id="op-logout" style="margin-top:16px;width:100%">Déconnecter</button>
    </div>
  </div>
</section>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2.45.4";
const CONFIG = {supabaseUrl:"https://taqdcytecvabwyanyptb.supabase.co",supabaseAnonKey:"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRhcWRjeXRlY3ZhYnd5YW55cHRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NTYwMjAsImV4cCI6MjA5OTQzMjAyMH0.MwAgQTIqxuTzTUpd-l_sTiLEmU9bjRPzwR-PPp8vCJU",price:10};
const sb = createClient(CONFIG.supabaseUrl, CONFIG.supabaseAnonKey);
const $ = id => document.getElementById(id);
let slots = [], orders = [];

const initTheme = () => {const t = localStorage.getItem("theme") || "light"; if(t === "dark") document.documentElement.classList.add("dark"); updateTheme();};
const updateTheme = () => {const d = document.documentElement.classList.contains("dark"); $("theme-toggle").textContent = d ? "☀️" : "🌙";};
$("theme-toggle").onclick = () => {const d = document.documentElement.classList.toggle("dark"); localStorage.setItem("theme", d ? "dark" : "light"); updateTheme();};

const fetchAll = async () => {
  const [s, o] = await Promise.all([sb.from("slots").select("*"), sb.from("orders").select("*")]);
  slots = s.data || [];
  orders = o.data || [];
};

const renderHours = () => {
  const box = $("op-hours");
  if(!box) return;
  box.innerHTML = Array.from({length:15}, (_, i) => {
    const h = 8 + i;
    return `<button class="btn ghost sm" data-hour="${h}:00" style="padding:8px">${String(h).padStart(2, '0')}:00</button>`;
  }).join("");
  box.querySelectorAll("[data-hour]").forEach(b => b.onclick = () => b.style.background = b.style.background ? "" : "var(--seal)");
};

$("op-add").onclick = async () => {
  const date = $("op-date").value;
  const selected = Array.from($("op-hours").querySelectorAll("[data-hour]")).filter(b => b.style.background).map(b => b.dataset.hour);
  if(!date || !selected.length) return $("op-add-error").textContent = "Sélectionne une date et des heures.";
  
  for(const hour of selected) {
    const start_at = new Date(date + "T" + hour + ":00").toISOString();
    await sb.from("slots").insert({start_at, status: "open"});
  }
  await fetchAll();
  $("op-add-error").textContent = "✅ Créneaux ouverts!";
  renderHours();
};

$("op-week").onclick = async () => {
  const now = new Date();
  for(let d = 0; d < 7; d++) {
    const date = new Date(now);
    date.setDate(date.getDate() + d);
    for(let h = 8; h < 23; h++) {
      const start_at = new Date(date);
      start_at.setHours(h, 0, 0, 0);
      await sb.from("slots").insert({start_at: start_at.toISOString(), status: "open"});
    }
  }
  await fetchAll();
  $("op-add-error").textContent = "✅ Semaine ouverte!";
};

$("op-login-btn").onclick = async () => {
  const {error} = await sb.auth.signInWithPassword({email: $("op-mail").value.trim(), password: $("op-pass").value});
  if(error) return $("op-error").textContent = "Email ou mot de passe incorrect.";
  $("op-login").hidden = true;
  $("op-console").hidden = false;
  await fetchAll();
  renderHours();
};

$("op-logout").onclick = async () => {
  await sb.auth.signOut();
  $("op-login").hidden = false;
  $("op-console").hidden = true;
};

(async () => {
  const {data} = await sb.auth.getSession();
  if(data.session) {
    $("op-login").hidden = true;
    $("op-console").hidden = false;
    await fetchAll();
    renderHours();
  }
})();

initTheme();
</script>
</body>
</html>
